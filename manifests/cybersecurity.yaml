version: 1
name: cybersecurity
description: >
  Curated set of 53 high-impact cybersecurity skills from the Anthropic-Cybersecurity-Skills
  library (754 skills total). Covers cloud security, threat hunting, malware analysis,
  incident response, penetration testing, web app security, network security, digital
  forensics, SOC operations, IAM, container security, DevSecOps, vulnerability management,
  and phishing defense. Each skill is mapped to MITRE ATT&CK, NIST CSF 2.0, MITRE ATLAS,
  D3FEND, and NIST AI RMF frameworks.

  Use when you need AI-guided security operations, threat hunting, incident response,
  or penetration testing workflows.

