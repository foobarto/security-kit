version: 1
name: full
description: >
  Union of sec-review and threat-modeling variants — 22 skills total. Default for
  /sec-kit install. Use when you want everything available on-demand without having
  to guess which variant fits.

  Deliberately excludes: entry-point-analyzer (smart-contract-only), firebase-apk-scanner
  (active scanner), skill-improver (aggressive self-loop hook), and fr33d3m0n's threat-
  modeling skill (ships a PostToolUse Write hook — use raptor if you want a hook-bearing
  offensive framework).

skills:
  # === sec-review ===
  - name: audit-context-building
